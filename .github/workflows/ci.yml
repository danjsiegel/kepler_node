name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --group dev --extra local-api --extra ui

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Operator-mode planner proof
        run: uv run pytest tests/test_ui_streamlit.py::test_headless_mode_flow_renders_actionable_planner_guidance tests/test_ui_streamlit.py::test_field_mode_flow_renders_actionable_local_planner_guidance -v